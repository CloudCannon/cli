name: Run the CLI
type: reference

steps:
  - step: I have a "package.json" file with the content {json}
    json: |-
      {
        "name": "cli-test-env",
        "type": "module",
        "private": "true",
        "dependencies": {
          "@cloudcannon/cli": "file:%dist_dir%"
        },
        "scripts": {
          "cloudcannon": "node ./node_modules/@cloudcannon/cli/index.js"
        }
      }
  - I run "npm i"
