name: cloudcannon configure generate --auto --source

steps:
  - I run "cp -R %test_sites%/vonge-jekyll src"
  - ref: ../../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure generate src --auto --source site"
  - step: I run {command}
    command: |
      cat src/cloudcannon.config.yml | sed 's/timezone: .*/timezone: UTC/'
