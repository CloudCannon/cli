name: cloudcannon configure generate --auto --output src/custom.yml

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ../../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure generate src --auto --output src/custom.yml"
  - step: I run {command}
    command: |
      cat src/custom.yml | sed 's/timezone: .*/timezone: UTC/'
  - snapshot: stdout
    snapshot_content: |-
      ╎paths:
      ╎  static: public
      ╎  uploads: public/uploads
      ╎timezone: UTC
      ╎markdown:
      ╎  engine: commonmark
      ╎  options:
      ╎    gfm: true
      ╎collections_config:
      ╎  pages:
      ╎    path: src/pages
      ╎    icon: wysiwyg
      ╎  blog:
      ╎    path: src/content/blog
      ╎    icon: event_available
      ╎  changelogs:
      ╎    path: src/changelogs
      ╎    icon: change_history
      ╎  content_pages:
      ╎    path: src/content/pages
      ╎    icon: contact_page
      ╎  data:
      ╎    path: data
      ╎    icon: data_usage
