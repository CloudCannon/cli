name: cloudcannon configure generate --auto --ssg jekyll

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ../../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure generate src --auto --ssg jekyll"
  - step: I run {command}
    command: |
      cat src/cloudcannon.config.yml | sed 's/timezone: .*/timezone: UTC/'
