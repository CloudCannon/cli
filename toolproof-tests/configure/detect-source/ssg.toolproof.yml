name: cloudcannon configure detect-source with --ssg

steps:
  - I run "cp -R %test_sites%/vonge-jekyll src"
  - ref: ../../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure detect-source src --ssg jekyll"
