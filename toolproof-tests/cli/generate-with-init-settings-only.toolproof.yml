name: CLI generate auto with initial-site-settings-only

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure generate src --auto --initial-site-settings-only"
  - I run "cat src/.cloudcannon/initial-site-settings.json"
  - stdout should contain "astro"
  - stdout should contain "install_command"
  - stdout should contain "build_command"
  - stdout should contain "output_path"
