name: CLI generate auto

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure generate src --auto"
  - I run "cat src/cloudcannon.config.yml"
  - stdout should contain "collections_config"
  - stdout should contain "pages"
  - stdout should contain "blog"
