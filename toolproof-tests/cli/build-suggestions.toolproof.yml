name: CLI build subcommand

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ./../core/run-cli.toolproof.yml
  - I run "npm -s run cloudcannon -- configure detect-build-commands src"
  - stdout should contain "npm i"
  - stdout should contain "npx astro build"
  - stdout should contain "dist"
